<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>KZStore Rebel City</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', sans-serif;
            color: white;
            text-align: center;
            background: #000;
            /* Biar gak ada ruang kosong putih di pinggir */
            width: 100%;
            overflow-x: hidden;
        }

        /* BG ANIMASI */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(90deg, #00ffff11 0px, #00ffff11 2px, transparent 2px, transparent 40px);
            z-index: -1;
            animation: movebg 6s linear infinite;
        }
        @keyframes movebg { 0% {background-position:0 0;} 100% {background-position:200px 0;} }

        /* --- INTRO RAKSASA --- */
        #intro {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            animation: fadeout 1.5s ease 3s forwards;
        }
        #intro img {
            width: 90%; /* Logo hampir seukuran layar HP */
            max-width: 500px;
            filter: drop-shadow(0 0 30px cyan);
            animation: logoanim 2s ease;
        }
        @keyframes logoanim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }
        @keyframes fadeout { to { opacity: 0; visibility: hidden; } }

        /* --- JUDUL KZSTORE GEDE BANGET --- */
        h1 {
            margin: 50px 0 20px 0;
            font-size: 60px; /* Gua naikin lagi sizenya */
            text-shadow: 0 0 20px cyan, 0 0 40px cyan;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- CONTAINER: PAKSA FULL WIDTH --- */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Kolom */
            gap: 15px;
            padding: 10px;
            width: 100vw; /* Viewport Width 100% */
            box-sizing: border-box;
        }

        /* --- CARD PADAT & GEDE --- */
        .card {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid cyan;
            border-radius: 20px;
            padding: 15px 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 2px solid white;
        }

        .card h2 {
            font-size: 20px; /* Tulisan produk gede */
            margin: 5px 0;
            font-weight: bold;
        }

        .card p {
            font-size: 26px; /* Harga gede banget */
            color: #00ffff;
            font-weight: 900;
            margin: 10px 0;
            text-shadow: 0 0 10px cyan;
        }

        button {
            width: 100%;
            padding: 18px 0; /* Tombol dibuat tebel */
            background: #00ffcc;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 900;
            color: black;
            cursor: pointer;
        }

        /* POPUP QRIS */
        .popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
        }
        .popup-content { margin: 25% auto; width: 90%; }
        .popup img { width: 100%; border: 5px solid cyan; border-radius: 20px; }
        .close { font-size: 70px; color: red; position: absolute; top: 20px; right: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro">
        <img src="kocakjir.png">
        <h2 style="color:cyan; font-size: 28px; margin-top: 20px;">KZSTORE REBEL CITY</h2>
    </div>

    <h1>KZStore</h1>

    <div class="container">
        <div class="card">
            <img src="tobaco.png" class="product-img">
            <h2>Backpack Tobaco</h2>
            <p>15K</p>
            <button onclick="beli('qris15.jpg')">BELI</button>
        </div>

        <div class="card">
            <img src="ak47.png" class="product-img">
            <h2>Backpack AK47</h2>
            <p>15K</p>
            <button onclick="beli('qris20.jpg')">BELI</button>
        </div>

        <div class="card">
            <img src="awp.png" class="product-img">
            <h2>Backpack AWP</h2>
            <p>25K</p>
            <button onclick="beli('qris25.jpg')">BELI</button>
        </div>
    </div>

    <div class="popup" id="popup">
        <span class="close" onclick="tutup()">&times;</span>
        <div class="popup-content">
            <img id="qrisgambar">
            <h2 style="font-size: 35px; margin-top: 20px;">SCAN SEKARANG!</h2>
        </div>
    </div>

    <script>
        function beli(gambar){
            document.getElementById("popup").style.display="block";
            document.getElementById("qrisgambar").src = gambar;
        }
        function tutup(){
            document.getElementById("popup").style.display="none";
        }
    </script>
</body>
</html>
